name = "alejandra-agente"
main = "worker.js"
compatibility_date = "2024-01-01"
preview_urls = false
account_id = "d65ead2b2967bf68ff3848a36cd7b1b4"

[[d1_databases]]
binding = "DB"
database_name = "alejandra-db"
database_id = "0c9eccde-78f1-476d-ac68-bf452bec0c62"

[[r2_buckets]]
binding = "FILES"
bucket_name = "alejandra-app-files"

# Service Binding al worker web raiz (alejandra-app-api): ahi vive la logica
# canonica de generacion/edicion de planos SVG (y el resto de tools con feedback
# visual en panel.html). Un Worker NO puede hacer fetch() normal a otro Worker
# en la misma zona (workers.dev cuenta como una zona compartida) sin Service
# Binding -- lo intentamos primero via fetch() a la URL publica y Cloudflare lo
# bloqueaba con Error 1042 ("Worker tried to fetch from another Worker on the
# same zone"). El Service Binding evita ademas el salto por la red publica.
[[services]]
binding = "API_WEB"
service = "alejandra-app-api"

# KV para rate limiting (ventana deslizante por identidad) y caché del tope
# de gasto diario global — ver validarRateLimit()/validarTopeGasto() en worker.js
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "4c9ebd2899d74bb7961786b70f25519c"

# Cron: Alejandra despierta 6 veces al día (ahorro ~65% vs cada hora)
# UTC 5=7h, 8=10h, 11=13h, 14=16h, 17=19h, 19=21h (hora España)
[triggers]
crons = ["0 5,8,11,14,17,19 * * *"]

# Secrets (configurar con: wrangler secret put <NOMBRE>)
# ANTHROPIC_API_KEY — clave de Anthropic (Claude Sonnet)
# OPENAI_API_KEY    — clave de OpenAI (búsqueda web con gpt-4o-mini)
