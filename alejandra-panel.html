<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandra — Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root{
  --bg:#0d0b1a;--surf:#17132b;--surf2:#221d3d;
  --acc:#8b5cf6;--acc2:#a78bfa;
  --text:#e5e7eb;--muted:#6b7280;--border:#2d2550;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
a{color:var(--acc2);text-decoration:none}

/* ── LOGIN ── */
#loginView{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:24px}
.login-card{background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{text-align:center;font-size:48px}
.login-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:22px;text-align:center}
.login-sub{color:var(--muted);font-size:12px;text-align:center}
.inp{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.btn-acc{background:var(--acc);color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;width:100%;transition:opacity .2s;letter-spacing:.5px}
.btn-acc:hover{opacity:.85}
.btn-acc:disabled{opacity:.4;cursor:default}

/* ── APP LAYOUT ── */
#appView{display:none;height:100%;flex-direction:row}

/* Sidebar desktop */
#sidebar{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:15px;display:flex;align-items:center;gap:8px}
.sidebar-sub{font-size:10px;color:var(--acc);font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:all .15s;letter-spacing:.3px}
.nav-item:hover{color:var(--text);background:var(--surf2)}
.nav-item.active{color:var(--acc2);border-left-color:var(--acc);background:rgba(139,92,246,.08)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.sidebar-ver{font-family:'Montserrat',sans-serif;font-weight:700;color:var(--acc2)}
.btn-logout{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:4px 0;display:block}
.btn-logout:hover{color:var(--red)}

/* Content wrap */
#contentWrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#topbar-hamburger{display:none;background:none;border:none;font-size:22px;color:var(--text);padding:0}
#topbar-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:14px}
#topbar-status{margin-left:auto;font-size:11px;color:var(--muted)}
#content{flex:1;overflow-y:auto;padding:20px}
#bottomNav{display:none;background:var(--surf);border-top:1px solid var(--border);flex-shrink:0}

/* Mobile sidebar overlay */
#mobileOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
#mobileSidebar{display:none;position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surf);z-index:201;border-right:1px solid var(--border);flex-direction:column;overflow-y:auto}

/* ── CARDS / STATS ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-val{font-family:'Montserrat',sans-serif;font-weight:900;font-size:24px;color:var(--acc)}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px}
.sec-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.3px}
.b-acc{background:rgba(139,92,246,.2);color:var(--acc2)}
.b-green{background:rgba(34,197,94,.15);color:var(--green)}
.b-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.b-red{background:rgba(239,68,68,.15);color:var(--red)}
.b-blue{background:rgba(59,130,246,.15);color:var(--blue)}

/* ── SYNC / REMOTE SCAN ── */
#syncFab{position:fixed;bottom:80px;right:20px;z-index:500;display:none;flex-direction:column;gap:8px;align-items:flex-end}
.fab-main{background:var(--acc);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:22px;box-shadow:0 4px 20px rgba(139,92,246,.5);transition:transform .2s,box-shadow .2s;position:relative}
.fab-main:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(139,92,246,.7)}
.fab-badge{position:absolute;top:-2px;right:-2px;background:var(--green);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--bg)}
.fab-badge.offline{background:var(--muted)}
.fab-label{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--muted);white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* Scan modal */
.scan-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .15s}
.scan-modal{background:var(--surf);border:1px solid var(--border);border-radius:18px;padding:28px;width:92%;max-width:440px;text-align:center}
.scan-modal h3{font-family:'Montserrat',sans-serif;font-weight:900;font-size:16px;margin-bottom:6px}
.scan-modal .sub{color:var(--muted);font-size:12px;margin-bottom:20px}
.scan-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.scan-type-btn{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;cursor:pointer;transition:all .15s;text-align:center}
.scan-type-btn:hover{border-color:var(--acc);background:rgba(139,92,246,.08)}
.scan-type-btn.sel{border-color:var(--acc);background:rgba(139,92,246,.12);box-shadow:0 0 0 2px rgba(139,92,246,.3)}
.scan-type-btn .ico{font-size:24px;display:block;margin-bottom:4px}
.scan-type-btn .lbl{font-size:11px;font-weight:600;color:var(--text)}

/* Waiting overlay */
.scan-waiting{text-align:center;padding:30px 20px}
.scan-waiting .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-waiting .msg{font-size:14px;color:var(--text);font-weight:600;margin-bottom:4px}
.scan-waiting .sub{font-size:12px;color:var(--muted)}

/* Toast notifications */
.toast-container{position:fixed;top:16px;right:16px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surf);border:1px solid var(--acc);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideInR .3s;pointer-events:auto;max-width:360px}
.toast .t-icon{font-size:20px;flex-shrink:0}
.toast .t-body{flex:1;font-size:12px;color:var(--text)}
.toast .t-title{font-weight:700;font-size:13px;margin-bottom:2px}
.toast .t-close{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 0 0 8px}
@keyframes slideInR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Device status bar */
.dev-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surf);border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
.dev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dev-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dev-dot.off{background:var(--muted)}
.dev-name{font-size:12px;color:var(--text);font-weight:600}
.dev-ping{font-size:10px;color:var(--muted);margin-left:auto}

/* Scan result card */
.scan-result{background:var(--surf);border:1px solid var(--acc);border-radius:14px;padding:16px;margin-bottom:12px;animation:fadeIn .3s}
.scan-result img{max-width:100%;border-radius:8px;margin:8px 0}
.scan-result .sr-meta{font-size:11px;color:var(--muted);margin-top:6px}
.b-muted{background:var(--surf2);color:var(--muted)}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-toolbar{background:var(--surf);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-uid{background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text);font-size:12px;width:100px;outline:none}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-input-bar{flex-shrink:0;padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.chat-ta{flex:1;background:var(--surf2);border:1px solid var(--acc);border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;max-height:100px;outline:none;line-height:1.4}
.chat-btn{width:44px;height:44px;border-radius:12px;border:1px solid var(--border);flex-shrink:0;font-size:18px;background:var(--surf2);color:var(--text)}
.chat-btn-send{background:var(--acc);border-color:var(--acc);color:#fff}
/* ── CHAT — estilo Claude Code ── */
.msg-u{display:flex;justify-content:flex-end;margin-bottom:16px}
.msg-b{display:flex;justify-content:flex-start;margin-bottom:16px;gap:10px}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.bub-u{max-width:78%;padding:10px 16px;background:var(--surf2);border:1px solid var(--border);color:var(--text);border-radius:18px 18px 4px 18px;font-size:14px;line-height:1.6;word-break:break-word}
.bub-b{flex:1;min-width:0;color:var(--text);font-size:14px;line-height:1.7;word-break:break-word}
/* Markdown dentro de bub-b */
.bub-b p{margin:0 0 10px}
.bub-b p:last-child{margin-bottom:0}
.bub-b h1,.bub-b h2,.bub-b h3{font-family:'Montserrat',sans-serif;font-weight:700;margin:16px 0 8px;color:var(--acc2)}
.bub-b h1{font-size:18px}.bub-b h2{font-size:16px}.bub-b h3{font-size:14px}
.bub-b ul,.bub-b ol{margin:6px 0 10px 20px}
.bub-b li{margin-bottom:4px}
.bub-b strong{color:#fff;font-weight:600}
.bub-b em{color:var(--acc2)}
.bub-b code{background:#1e1e2e;color:#cba6f7;padding:2px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:13px}
.bub-b pre{background:#1e1e2e;border:1px solid #313244;border-radius:10px;margin:10px 0;overflow:hidden}
.bub-b pre code{background:none;color:inherit;padding:14px 16px;display:block;overflow-x:auto;font-size:13px;line-height:1.5}
.bub-b blockquote{border-left:3px solid var(--acc);padding:6px 12px;color:var(--muted);margin:8px 0;font-style:italic}
.bub-b hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.bub-b table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.bub-b th{padding:6px 10px;border:1px solid var(--border);background:var(--surf2);color:var(--acc2);text-align:left}
.bub-b td{padding:6px 10px;border:1px solid var(--border)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:#181825;border-bottom:1px solid #313244}
.code-lang{font-size:11px;color:#6c7086;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:1px}
.code-copy{font-size:11px;color:#6c7086;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .2s}
.code-copy:hover{color:var(--acc2)}
/* ── Streaming: routing + tools ── */
.stream-block{display:flex;flex-direction:column;gap:2px;margin-bottom:16px}
.stream-routing{display:flex;align-items:center;gap:8px;padding:0 0 6px 38px;font-family:'Courier New',monospace}
.routing-badge{font-size:11px;color:var(--acc2);background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);padding:2px 10px;border-radius:20px}
.routing-model{font-size:10px;color:var(--muted)}
.tool-block{margin:1px 0 1px 38px;border-left:2px solid var(--border);padding:5px 0 5px 12px;font-family:'Courier New',monospace;font-size:12px;transition:border-color .3s}
.tool-block.running{border-left-color:var(--acc)}
.tool-block.done{border-left-color:var(--green)}
.tool-header{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.tool-icon-spin{color:var(--acc);display:inline-block;animation:spin .8s linear infinite}
.tool-icon-done{color:var(--green)}
@keyframes spin{to{transform:rotate(360deg)}}
.tool-name{color:var(--text);font-weight:700}
.tool-input-preview{color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
.tool-ms{color:var(--muted);font-size:10px;margin-left:auto}
.tool-result-preview{color:#6c7086;font-size:11px;margin-top:3px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;padding-left:16px}
/* loading dots */
.typing-dots{display:inline-flex;gap:4px;padding:6px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:dotBounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
/* meta */
.msg-meta{font-size:10px;color:var(--muted);padding-left:38px;margin-top:-8px;margin-bottom:8px}
.bub-err{color:var(--red);font-size:13px;padding:6px 0}
.voz-status{font-size:11px;color:var(--acc);text-align:center;padding:5px;animation:pulse 1.2s infinite;display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 10px;color:var(--muted);font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}

/* ── COST BARS ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.bar-label{font-size:11px;color:var(--muted);text-align:right;width:60px;flex-shrink:0}
.bar-track{flex:1;background:var(--surf2);border-radius:4px;height:14px;overflow:hidden}
.bar-fill{background:var(--acc);height:100%;border-radius:4px;transition:width .5s}
.bar-val{width:70px;font-size:11px;color:var(--text);flex-shrink:0}

/* ── MEMORY LIST ── */
.mem-item{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.mem-head{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.mem-tit{font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;flex:1}
.mem-body{font-size:12px;color:var(--muted);line-height:1.45}
.mem-date{font-size:10px;color:var(--muted);margin-top:4px}

/* ── FILTER TABS ── */
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ftab{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surf2);color:var(--muted);font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.ftab.active{background:var(--acc);border-color:var(--acc);color:#fff}

/* ── FORM ── */
.fg{margin-bottom:16px}
.fl{display:block;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.radio-group{display:flex;gap:8px}
.radio-card{flex:1;padding:12px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;transition:all .15s;line-height:1.5}
.radio-card.sel{border-color:var(--acc);color:var(--acc);background:rgba(139,92,246,.1)}
.range-row{display:flex;align-items:center;gap:12px}

/* ── REFLEXION ── */
.reflex-btn{width:100%;padding:16px;background:var(--acc);color:#fff;border:none;border-radius:14px;font-family:'Montserrat',sans-serif;font-weight:900;font-size:14px;letter-spacing:.5px;transition:opacity .2s}
.reflex-btn:hover{opacity:.85}
.reflex-btn:disabled{opacity:.4;cursor:default}

/* ── LOG ITEM ── */
.log-item{border-bottom:1px solid var(--border);padding:10px 0;cursor:pointer;transition:background .15s}
.log-item:hover{background:rgba(139,92,246,.06);border-radius:8px;padding-left:6px}
.log-item:last-child{border-bottom:none}
.log-head{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.log-full{display:none;margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.log-full.open{display:block}
.log-full-u{font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.log-full-a{font-size:12px;line-height:1.5;color:var(--acc2);margin-top:8px;white-space:pre-wrap;word-break:break-word}

/* ── RESPONSIVE ── */
@media(max-width:767px){
  #sidebar{display:none}
  #topbar-hamburger{display:block}
  #bottomNav{display:flex}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 2px;background:none;border:none;color:var(--muted);font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.3px}
  .bnav-btn.active{color:var(--acc2)}
  .bnav-icon{font-size:19px}
  .card-grid{grid-template-columns:repeat(2,1fr)}
  #content{padding:12px}
  .bub{max-width:92%}
}
</style>
</head>
<body>

<!-- Toast notifications -->
<div class="toast-container" id="toastContainer"></div>

<!-- Floating scan button -->
<div id="syncFab">
  <div class="fab-label" id="syncFabLabel">📱 Sin móvil conectado</div>
  <button class="fab-main" onclick="abrirScanModal()" title="Escanear con el móvil">
    📷
    <span class="fab-badge offline" id="syncFabBadge">0</span>
  </button>
</div>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="loginView">
  <div class="login-card">
    <div class="login-logo">🤖</div>
    <div>
      <div class="login-title">Alejandra</div>
      <div class="login-sub">Panel de Control v5.92</div>
    </div>
    <div>
      <label class="fl">Token de administrador</label>

// Convierte array de filas {rol,contenido,canal,created_at} en pares {user,assistant}
function historialAPares(rows) {
  const pares = [];
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].rol === 'user') {
      const asst = rows[i+1]?.rol === 'assistant' ? rows[i+1] : null;
      pares.push({ canal: rows[i].canal||'?', mensaje: rows[i].contenido, respuesta: asst?.contenido||'', created_at: rows[i].created_at });
      if (asst) i++;
    }
  }
  return pares;
}
const CANAL_COLOR = { web:'b-green', telegram:'b-blue', panel:'b-acc', app:'b-green' };

function logItemHtml(x, uid) {
  const preview = (s, n) => { const t = (s||''); return esc(t.substring(0,n)) + (t.length>n?'…':''); };
  return `
    <div class="log-item" onclick="toggleLog('li_${uid}')">
      <div class="log-head">
        <span class="badge ${CANAL_COLOR[x.canal]||'b-muted'}">${x.canal||'?'}</span>
        <span style="margin-left:auto;font-size:10px;color:var(--muted)">${fmtDate(x.created_at)}</span>
        <span style="font-size:10px;color:var(--muted)" id="arr_${uid}">▸</span>
      </div>
      <div style="font-size:12px"><b style="color:var(--muted)">↑</b> ${preview(x.mensaje, 100)}</div>
      <div style="font-size:11px;color:var(--acc2);margin-top:2px"><b>↓</b> ${preview(x.respuesta, 100)}</div>
      <div class="log-full" id="li_${uid}">
        <div class="log-full-u"><b style="color:var(--muted)">Tú:</b><br>${esc(x.mensaje||'')}</div>
        <div class="log-full-a"><b>Alejandra:</b><br>${esc(x.respuesta||'')}</div>

    </div>`;
}

function toggleLog(id) {
  const el  = document.getElementById(id);

  const open = el.classList.toggle('open');

}

function renderHistorial(items) {
  if (!items.length) return '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px">Sin conversaciones</div>';

// ═══════════════ AUTH ═══════════════════════════════════════
const API_MAIN = 'https://alejandra-app-api.alejandra-app.workers.dev';

async function doLoginGoogle() {
  const btn = document.getElementById('loginGoogleBtn');
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Conectando...';
  try {
    const redirectUri = window.location.origin + window.location.pathname;
    const res = await fetch(`${API_MAIN}/auth/google/url?redirect_uri=${encodeURIComponent(redirectUri)}`);
    const data = await res.json();
    if (!res.ok || !data.url) {
      errEl.style.display = 'block';
      errEl.textContent = data.error || 'Error al conectar con Google';
      btn.disabled = false; btn.textContent = 'Entrar con Google'; return;
    }
    window.location.href = data.url;
  } catch { errEl.style.display = 'block'; errEl.textContent = 'Error de conexión'; btn.disabled = false; }
}

async function handleGoogleCallback(code) {
  document.getElementById('loginView').style.display = 'flex';
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginGoogleBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Verificando...'; }
  try {
    const redirectUri = window.location.origin + window.location.pathname;
    // 1. Intercambiar code por sesión en el worker principal
    const r1 = await fetch(`${API_MAIN}/auth/google/callback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, redirect_uri: redirectUri }),
    });
    const d1 = await r1.json();
    window.history.replaceState({}, '', window.location.pathname);
    if (!r1.ok || !d1.ok) {
      errEl.style.display = 'block';
      errEl.textContent = d1.pendiente ? 'Cuenta pendiente de aprobación.' : (d1.error || 'Error al verificar con Google');
      if (btn) btn.disabled = false;
      return;
    }
    // 2. Verificar que tiene rol superadmin y obtener ADMIN_TOKEN del agente
    const r2 = await fetch(`${API}/auth/verify-session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_token: d1.token }),
    });
    const d2 = await r2.json();
    if (!r2.ok || !d2.ok) {
      errEl.style.display = 'block';
      errEl.textContent = d2.error || 'Sin permisos para el panel del agente';
      if (btn) btn.disabled = false;
      return;
    }
    adminToken = d2.token;
    localStorage.setItem('alej_token', adminToken);
    showApp();
  } catch(e) { errEl.style.display = 'block'; errEl.textContent = 'Error de conexión'; if (btn) btn.disabled = false; }
}

async function login() {
  const t = document.getElementById('loginToken').value.trim();
  if (!t) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Verificando...';
  try {
    const r = await fetch(`${API}/api/admin/config`, { headers:{ Authorization:`Bearer ${t}` } });
    if (r.status === 403) throw new Error('Token incorrecto');
    adminToken = t;
    localStorage.setItem('alej_token', t);
    showApp();
  } catch(err) {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginErr').textContent = err.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function logout() {
  localStorage.removeItem('alej_token');
  adminToken = '';
  document.getElementById('appView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'flex';

}

// Inicializar marked + highlight.js
function setupMarked() {
  if (typeof marked === 'undefined' || typeof hljs === 'undefined') return;
  marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
      return hljs.highlightAuto(code).value;
    }
  });
}

function renderMd(txt) {
  if (typeof marked === 'undefined') return `<p>${esc(txt)}</p>`;
  return marked.parse(txt);
}

function addCopyBtns(el) {
  el.querySelectorAll('pre').forEach(pre => {
    if (pre.querySelector('.code-header')) return;
    const code = pre.querySelector('code');
    const lang = (code?.className || '').replace('language-','').replace('hljs ','').split(' ')[0] || '';
    const header = document.createElement('div');
    header.className = 'code-header';
    header.innerHTML = `<span class="code-lang">${lang}</span><button class="code-copy" onclick="copyCode(this)">Copiar</button>`;
    pre.insertBefore(header, pre.firstChild);
  });
}

function copyCode(btn) {
  const code = btn.closest('pre')?.querySelector('code')?.innerText || '';
  navigator.clipboard.writeText(code).then(() => { btn.textContent = 'Copiado!'; setTimeout(() => btn.textContent = 'Copiar', 2000); });
}

const TOOL_ICONS = { memory_save:'💾', memory_read:'🧠', buscar_web:'🔍', propose_mejora:'✏️', buscar_web_openai:'🌐' };

      </div>

          <div style="font-weight:600;color:var(--text)">Alejandra lista</div>

        <textarea id="chatInput" class="chat-ta" rows="1" placeholder="Pregunta algo a Alejandra..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarChat()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>

// ── Helpers ───────────────────────────────────────────────────
function formatToolInput(nombre, input) {
  if (!input) return '';
  switch(nombre) {
    case 'buscar_web':      return `"${(input.query||'').substring(0,50)}"`;
    case 'memory_save':     return `[${input.tipo||''}] ${(input.titulo||'').substring(0,40)}`;
    case 'memory_read':     return input.tipo ? `tipo:${input.tipo}` : `limit:${input.limit||10}`;
    case 'propose_mejora':  return `[${input.prioridad||''}] ${(input.descripcion||'').substring(0,40)}`;
    case 'leer_estado':     return 'estado actual';
    case 'tomar_decision':  return `[${input.tipo||''}] confianza:${Math.round((input.confianza||0)*100)}%`;
    default: return JSON.stringify(input).substring(0,50);
  }
}

// ── Adjuntos (R2 upload) ──────────────────────────────────────
let _adjuntos = [];

async function subirAdjuntos(ev) {
  const files = Array.from(ev.target.files || []);
  ev.target.value = '';
  for (const f of files) {
    if (f.size > 20 * 1024 * 1024) { alert(`${f.name} supera 20MB`); continue; }
    const cont = document.getElementById('chatAdjuntos');
    const chip = document.createElement('div');
    chip.style.cssText = 'background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text)';
    chip.innerHTML = `<span>⏳</span><span>${esc(f.name)}</span>`;
    cont.appendChild(chip); cont.style.display = 'flex';
    try {
      const fd = new FormData();
      fd.append('file', f);
      fd.append('usuario_id', chatUserId || 'adrian');
      const r = await fetch(`${API}/upload`, { method: 'POST', body: fd });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'upload failed');
      _adjuntos.push(j.url);
      chip.innerHTML = `<span>📎</span><span>${esc(f.name)}</span><span style="cursor:pointer;color:var(--muted)" onclick="quitarAdjunto('${j.url}', this.parentElement)">×</span>`;
    } catch(e) {
      chip.innerHTML = `<span style="color:#f55">❌ ${esc(f.name)}</span>`;
      setTimeout(()=>chip.remove(), 3000);
    }
  }
}

function quitarAdjunto(url, chip) {
  _adjuntos = _adjuntos.filter(u => u !== url);
  chip.remove();
  const cont = document.getElementById('chatAdjuntos');
  if (!cont.children.length) cont.style.display = 'none';
}

// ── Enviar con streaming SSE ──────────────────────────────────
let _chatBusy = false;

async function enviarChat() {
  if (_chatBusy) return;
  const input = document.getElementById('chatInput');
  const msg   = (input?.value || '').trim();
  if (!msg) return;
  _chatBusy = true;
  input.value = ''; input.style.height = 'auto';
  const adjuntosEnviados = _adjuntos.slice();
  _adjuntos = [];
  const cont = document.getElementById('chatAdjuntos');
  if (cont) { cont.innerHTML = ''; cont.style.display = 'none'; }

  const msgs = document.getElementById('chatMsgs');

  // Mensaje usuario
  const mu = document.createElement('div');
  mu.className = 'msg-u';
  mu.innerHTML = `<div class="bub-u">${esc(msg)}</div>`;
  msgs.appendChild(mu);
  msgs.scrollTop = msgs.scrollHeight;

  // Bloque de respuesta streaming
  const block = document.createElement('div');
  block.className = 'stream-block';
  // Dots iniciales de carga
  const dotsRow = document.createElement('div');
  dotsRow.className = 'msg-b';
  dotsRow.innerHTML = `<div class="msg-avatar">🤖</div><div class="bub-b"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  block.appendChild(dotsRow);
  msgs.appendChild(block);
  msgs.scrollTop = msgs.scrollHeight;

  // Estado compartido
  const state = {
    block, msgs,
    textBub: null,
    _toolStack: [],
    _toolCounter: 0,
  };

  try {
    // Contexto de pantalla: sección actual del panel
    const _sec = SECTIONS.find(s => s.id === currentSection);
    const _pantalla = _sec ? `Panel > ${_sec.label}` : 'Panel';
    // Rol: el panel es admin, asumimos superadmin (Adrián). Se puede sobrescribir en localStorage.
    const _rol = localStorage.getItem('alej_rol') || 'superadmin';
    // DOM compacto de la pantalla actual — para que Alejandra sepa qué selectores usar en <plan>
    const _domActual = capturarDomActual();

    const resp = await fetch(`${API}/api/chat/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mensaje: msg,
        usuario_id: chatUserId,
        canal: 'panel',
        rol: _rol,
        pantalla: _pantalla,
        dom_actual: _domActual,
        adjuntos: adjuntosEnviados
      })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader  = resp.body.getReader();
    const dec     = new TextDecoder();
    let buf       = '';
    let dotsRemoved = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          if (!dotsRemoved && ev.type !== 'error') { dotsRow.remove(); dotsRemoved = true; }
          await handleStreamEv(ev, state);
        } catch(e) {}
      }
    }
  } catch(err) {
    dotsRow.remove();
    const errEl = document.createElement('div');
    errEl.className = 'msg-b';
    errEl.innerHTML = `<div class="msg-avatar">🤖</div><div class="bub-b"><div class="bub-err">❌ ${esc(err.message)}</div></div>`;
    block.appendChild(errEl);
    if (input) input.value = msg;
  } finally {
    _chatBusy = false;
    msgs.scrollTop = msgs.scrollHeight;
  }
}

async function handleStreamEv(ev, state) {
  const { block, msgs } = state;

  if (ev.type === 'routing') {
    const r = document.createElement('div');
    r.className = 'stream-routing';
    const modelo = (ev.modelo||'').replace('claude-','').replace(/-4-[0-9]/,'');
    r.innerHTML = `<span class="routing-badge">⚡ ${ev.experto}</span><span class="routing-model">${modelo}${ev.buscar_web ? ' · 🌐 web' : ''}</span>`;
    block.appendChild(r);
    msgs.scrollTop = msgs.scrollHeight;
  }

  else if (ev.type === 'tool_start') {
    const id = ++state._toolCounter;
    const inputTxt = formatToolInput(ev.nombre, ev.input);
    const el = document.createElement('div');
    el.className = 'tool-block running';
    el.dataset.tid = id;
    el.innerHTML = `<div class="tool-header">
      <span class="tool-icon-spin">⟳</span>
      <span class="tool-name">${toolIcon(ev.nombre)} ${ev.nombre}</span>
      <span class="tool-input-preview">${esc(inputTxt)}</span>
    </div>`;
    block.appendChild(el);
    state._toolStack.push({ id, nombre: ev.nombre });
    msgs.scrollTop = msgs.scrollHeight;
  }

  else if (ev.type === 'tool_end') {
    const info = state._toolStack.shift();
    if (!info) return;
    const el = block.querySelector(`.tool-block[data-tid="${info.id}"]`);
    if (!el) return;
    el.classList.remove('running');
    el.classList.add('done');
    const inputTxt = el.querySelector('.tool-input-preview')?.textContent || '';
    const preview  = ev.preview ? esc(ev.preview.substring(0,140)) + (ev.preview.length>140?'…':'') : '';
    el.innerHTML = `<div class="tool-header">
      <span class="tool-icon-done">✓</span>
      <span class="tool-name">${toolIcon(info.nombre)} ${info.nombre}</span>
      <span class="tool-input-preview">${inputTxt}</span>
      <span class="tool-ms">${ev.duracion_ms||0}ms</span>
    </div>${preview ? `<div class="tool-result-preview">${preview}</div>` : ''}`;
    msgs.scrollTop = msgs.scrollHeight;
  }

  else if (ev.type === 'text') {
    // Crear burbuja de respuesta
    const row = document.createElement('div');
    row.className = 'msg-b';
    row.innerHTML = `<div class="msg-avatar">🤖</div>`;
    const bub = document.createElement('div');
    bub.className = 'bub-b';
    row.appendChild(bub);
    block.appendChild(row);
    state.textBub = bub;

    // Typewriter palabra a palabra
    const words = ev.texto.split(' ');
    let cur = '';
    for (let i = 0; i < words.length; i++) {
      cur += (i > 0 ? ' ' : '') + words[i];
      bub.innerHTML = renderMd(cur);
      msgs.scrollTop = msgs.scrollHeight;
      if (i % 5 === 0) await new Promise(r => setTimeout(r, 16));
    }
    // Detectar y extraer bloques <plan>...</plan> y <guia>...</guia>
    let textoLimpio = ev.texto;
    const planMatch = textoLimpio.match(/<plan>([\s\S]*?)<\/plan>/);
    if (planMatch) {
      textoLimpio = textoLimpio.replace(planMatch[0], '').trim();
      try {
        const plan = JSON.parse(planMatch[1]);
        setTimeout(() => ofrecerPlan(plan), 200);
      } catch (e) { console.warn('[plan] JSON inválido:', e); }
    }
    const guiaMatch = textoLimpio.match(/<guia>([\s\S]*?)<\/guia>/);
    if (guiaMatch) {
      textoLimpio = textoLimpio.replace(guiaMatch[0], '').trim();
      try {
        const guia = JSON.parse(guiaMatch[1]);
        setTimeout(() => ofrecerGuia(guia), 200);
      } catch (e) { console.warn('[guia] JSON inválido:', e); }
    }
    bub.innerHTML = renderMd(textoLimpio);
    addCopyBtns(bub);
    hablar(textoLimpio);
  }

  else if (ev.type === 'done') {
    const parts = [];
    if (ev.experto)      parts.push(`experto: ${ev.experto}`);
    if (ev.busqueda_web) parts.push('web search');
    if (ev.modelo)       parts.push((ev.modelo).replace('claude-','').replace(/-4-[0-9]/,''));
    if (parts.length) {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = parts.join(' · ');
      block.appendChild(meta);
    }
  }

  else if (ev.type === 'error') {
    const el = document.createElement('div');
    el.className = 'msg-b';
    el.innerHTML = `<div class="msg-avatar">🤖</div><div class="bub-b"><div class="bub-err">❌ ${esc(ev.mensaje||'Error')}</div></div>`;
    block.appendChild(el);
  }

  msgs.scrollTop = msgs.scrollHeight;
}

// ═══════════════ CAPTURA DE DOM (para que Alejandra sepa los selectores) ═══
function capturarDomActual() {
  // Capturamos elementos interactivos del contenido principal y la nav
  const lineas = [];
  const yaVisto = new Set();

  const procesar = (el, scope) => {
    if (!el || yaVisto.has(el)) return;
    yaVisto.add(el);
    const tag = el.tagName.toLowerCase();
    const id  = el.id ? `#${el.id}` : '';
    const cls = (!id && el.className && typeof el.className === 'string')
      ? '.' + el.className.split(/\s+/).filter(Boolean).slice(0,2).join('.')
      : '';
    if (!id && !cls) return; // sin selector útil, lo saltamos

    let etiqueta = '';
    if (tag === 'input' || tag === 'textarea') {
      const type = el.type || 'text';
      const ph   = (el.placeholder || '').slice(0, 40);
      const name = el.name ? ` name="${el.name}"` : '';
      etiqueta = `[${type}]${name}${ph ? ` placeholder="${ph}"` : ''}`;
    } else if (tag === 'select') {
      const opts = Array.from(el.options).slice(0, 5)
        .map(o => o.value || o.text).filter(Boolean).join('|');
      etiqueta = `[opciones: ${opts}]`;
    } else {
      // button, a, [onclick]
      const txt = (el.textContent || '').trim().replace(/\s+/g, ' ').slice(0, 50);
      etiqueta = txt ? `"${txt}"` : '';
    }
    lineas.push(`${scope}${tag}${id}${cls}: ${etiqueta}`);
  };

  // 1) Navegación lateral (siempre disponible)
  document.querySelectorAll('#sideNav .nav-item, #bottomNav .bnav-btn').forEach(el => {
    procesar(el, 'NAV ');
  });

  // 2) Contenido de la sección actual
  const content = document.getElementById('content');
  if (content) {
    const selectores = 'button, input, textarea, select, a[href], [onclick]';
    content.querySelectorAll(selectores).forEach(el => {
      // ignorar elementos invisibles
      if (el.offsetParent === null && el.tagName !== 'INPUT') return;
      procesar(el, '');
    });
  }

  // 3) Chat tiene botones flotantes (adjuntar, enviar)
  if (currentSection === 'chat') {
    ['chatInput', 'chatAdjuntoBtn', 'chatSendBtn'].forEach(id => {
      const el = document.getElementById(id);
      if (el) procesar(el, '');
    });
  }

  // Limitar a 60 elementos para no inflar tokens
  return lineas.slice(0, 60);
}

async function ejecutarPlan(titulo, acciones) {
  // Overlay flotante de progreso
  const float = document.createElement('div');
  float.id = 'planFloat';
  float.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--surf);border:1px solid var(--acc);border-radius:10px;padding:14px 16px;width:340px;z-index:9998;box-shadow:0 8px 32px rgba(0,0,0,.4);font-family:Montserrat,sans-serif';
  float.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:16px">🤖</span>
      <div style="flex:1;font-weight:700;color:var(--text);font-size:13px">${esc(titulo)}</div>
      <button id="planStop" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1">×</button>
    </div>
    <div id="planProgress" style="height:3px;background:var(--bord);border-radius:3px;overflow:hidden;margin-bottom:10px">
      <div id="planBar" style="height:100%;width:0;background:var(--acc);transition:width .3s"></div>
    </div>
    <div id="planEstado" style="color:var(--muted);font-size:12px;line-height:1.4;min-height:34px"></div>`;
  document.body.appendChild(float);

  let cancelado = false;
  float.querySelector('#planStop').onclick = () => { cancelado = true; float.remove(); };
  const bar = float.querySelector('#planBar');
  const estado = float.querySelector('#planEstado');

  const total = acciones.length;
  for (let i = 0; i < total && !cancelado; i++) {
    const a = acciones[i];
    const ico = _ICONO_ACCION[a.tipo] || '•';
    estado.innerHTML = `${ico} <strong>${i+1}/${total}</strong>: ${esc(a.desc || a.tipo)}`;
    bar.style.width = `${((i+1)/total)*100}%`;

    try {
      await ejecutarAccion(a);
    } catch (e) {
      estado.innerHTML = `<span style="color:#ef4444">❌ Error en paso ${i+1}: ${esc(e.message)}</span>`;
      console.error('[plan] error:', a, e);
      // Esperar 3s y abortar
      await new Promise(r => setTimeout(r, 3000));
      float.remove();
      return;
    }
    // pausa breve entre acciones para que el usuario vea qué pasa
    await new Promise(r => setTimeout(r, 600));
  }

  if (!cancelado) {
    estado.innerHTML = `<span style="color:#10b981">✓ Plan completado</span>`;
    bar.style.background = '#10b981';
    setTimeout(() => float.remove(), 2500);
  }
}

async function ejecutarAccion(a) {
  const findEl = (sel) => {
    const el = document.querySelector(sel);
    if (!el) throw new Error(`No encuentro elemento: ${sel}`);
    return el;
  };
  const highlight = (el) => {
    const orig = el.style.boxShadow;
    el.style.boxShadow = '0 0 0 3px var(--acc), 0 0 18px rgba(139,92,246,.6)';
    el.style.transition = 'box-shadow .25s';
    setTimeout(() => { el.style.boxShadow = orig; }, 900);
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  switch (a.tipo) {
    case 'navegar': {
      if (typeof navigate === 'function') navigate(a.destino);
      else throw new Error('navigate() no disponible');
      break;
    }
    case 'click': {
      const el = findEl(a.selector);
      highlight(el);
      await new Promise(r => setTimeout(r, 350));
      el.click();
      break;
    }
    case 'rellenar': {
      const el = findEl(a.selector);
      highlight(el);
      el.focus();
      // setter nativo para inputs/textarea (compatible con React/Vue si los hubiera)
      const proto = el.tagName === 'TEXTAREA'
        ? window.HTMLTextAreaElement.prototype
        : window.HTMLInputElement.prototype;
      const setter = Object.getOwnPropertyDescriptor(proto, 'value')?.set;
      if (setter) setter.call(el, a.valor); else el.value = a.valor;
      el.dispatchEvent(new Event('input', { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
      break;
    }
    case 'seleccionar': {
      const el = findEl(a.selector);
      highlight(el);
      el.value = a.valor;
      el.dispatchEvent(new Event('change', { bubbles: true }));
      break;
    }
    case 'esperar': {
      await new Promise(r => setTimeout(r, Number(a.ms) || 500));
      break;
    }
    case 'scroll': {
      const el = findEl(a.selector);
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
    }
    default:
      throw new Error(`Tipo de acción desconocido: ${a.tipo}`);
  }
}

  render();

function toggleVozAuto() {
  _vozAuto = !_vozAuto;
  const btn = document.getElementById('vozAutoBtn');
  if (btn) { btn.textContent = _vozAuto ? '🔊' : '🔇'; btn.style.borderColor = _vozAuto ? 'var(--acc)' : 'var(--border)'; }
  if (!_vozAuto) window.speechSynthesis?.cancel();
}
function hablar(txt) {
  if (!_vozAuto) return;
  const synth = window.speechSynthesis; if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(txt.substring(0,500));
  u.lang = 'es-ES'; u.rate = 1.05;
  const voz = synth.getVoices().find(v=>v.lang.startsWith('es')&&/female|lucia|maria/i.test(v.name)) || synth.getVoices().find(v=>v.lang.startsWith('es'));
  if (voz) u.voice = voz;
  synth.speak(u);
}
function toggleVoz() {
  if (_escuchando) { _rec?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Usa Chrome para voz'); return; }
  _rec = new SR(); _rec.lang='es-ES'; _rec.continuous=false; _rec.interimResults=false;
  const btn=document.getElementById('vozBtn'), st=document.getElementById('vozStatus');
  _rec.onstart  = ()=>{ _escuchando=true; if(btn){btn.textContent='⏹️';btn.style.background='var(--red)';btn.style.borderColor='var(--red)';} if(st)st.style.display='block'; window.speechSynthesis?.cancel(); };
  _rec.onresult = e=>{ const t=e.results[0][0].transcript.trim(); const i=document.getElementById('chatInput'); if(i)i.value=t; enviarChat(); };
  _rec.onerror  = e=>{ if(e.error!=='aborted')console.error('STT:',e.error); };
  _rec.onend    = ()=>{ _escuchando=false; if(btn){btn.textContent='🎙️';btn.style.background='var(--surf2)';btn.style.borderColor='var(--border)';} if(st)st.style.display='none'; };
  _rec.start();
}

async function lanzarReflexion() {

      body: JSON.stringify({ token: adminToken })

    const d = await r.json();
    st.style.display='none'; res.style.display='block';

    res.textContent = d.ok ? '✅ Reflexión iniciada. Alejandra está pensando...' : ('❌ '+(d.error||'Error'));

async function cambiarPassword() {
  const nueva  = document.getElementById('pwNueva').value;
  const conf   = document.getElementById('pwConfirm').value;
  const msg    = document.getElementById('pwMsg');
  msg.textContent = '';
  if (!nueva || nueva.length < 6) { msg.style.color='var(--red)'; msg.textContent='Mínimo 6 caracteres'; return; }
  if (nueva !== conf) { msg.style.color='var(--red)'; msg.textContent='Las contraseñas no coinciden'; return; }
  try {
    await adminFetch('/api/admin/tokens/change', 'POST', { token_nuevo: nueva });
    adminToken = nueva;
    localStorage.setItem('alej_token', nueva);
    msg.style.color = 'var(--green)';
    msg.textContent = '✅ Contraseña cambiada. Sesión actualizada.';
    document.getElementById('pwNueva').value = '';
    document.getElementById('pwConfirm').value = '';
  } catch(err) { msg.style.color='var(--red)'; msg.textContent='❌ '+err.message; }
}

async function crearUsuario() {
  const nombre = document.getElementById('nuevoNombre').value.trim();
  const token  = document.getElementById('nuevoToken').value;
  const msg    = document.getElementById('nuevoMsg');
  msg.textContent = '';
  if (!nombre) { msg.style.color='var(--red)'; msg.textContent='El nombre es obligatorio'; return; }
  if (!token || token.length < 6) { msg.style.color='var(--red)'; msg.textContent='Mínimo 6 caracteres'; return; }
  try {
    await adminFetch('/api/admin/tokens', 'POST', { nombre, token_valor: token });
    msg.style.color = 'var(--green)';
    msg.textContent = '✅ Acceso creado correctamente';
    document.getElementById('nuevoNombre').value = '';
    document.getElementById('nuevoToken').value = '';
    setTimeout(initSeguridad, 800);
  } catch(err) { msg.style.color='var(--red)'; msg.textContent='❌ '+err.message; }
}

async function revocarToken(id, nombre) {
  if (!confirm(`¿Revocar acceso de "${nombre}"?`)) return;
  try {
    await adminFetch('/api/admin/tokens', 'DELETE', { id });
    initSeguridad();
  } catch(err) { alert('Error: '+err.message); }
}

// ═══════════════ SYNC / REMOTE SCAN ════════════════════════
let _syncInterval = null;
let _pingInterval = null;
let _syncDesde = new Date().toISOString();
let _dispositivosConectados = [];
let _scanPendiente = null; // {id, tipo, ts}
let _scanResultados = []; // últimos resultados recibidos

function iniciarSync() {
  // Ping: registrar este dispositivo (office/web) cada 30s
  hacerPing();
  _pingInterval = setInterval(hacerPing, 30000);
  // Polling: buscar eventos nuevos cada 3s
  _syncInterval = setInterval(pollEventos, 3000);
  // Mostrar FAB
  document.getElementById('syncFab').style.display = 'flex';
}

function detenerSync() {
  clearInterval(_syncInterval); clearInterval(_pingInterval);
  _syncInterval = null; _pingInterval = null;
}

async function hacerPing() {
  try {
    const r = await fetch(`${API}/api/sync/ping`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
      body: JSON.stringify({ tipo: 'office', nombre: 'Alejandra Office' })
    });
    const d = await r.json();
    _dispositivosConectados = d.dispositivos || [];
    actualizarFabEstado();
    actualizarSeccionDispositivos();
  } catch {}
}

function actualizarFabEstado() {
  const badge = document.getElementById('syncFabBadge');
  const label = document.getElementById('syncFabLabel');
  const moviles = _dispositivosConectados.filter(d => d.tipo === 'app');
  if (moviles.length > 0) {
    badge.textContent = moviles.length;
    badge.className = 'fab-badge';
    label.textContent = `📱 ${moviles[0].nombre || 'Móvil'} conectado`;
  } else {
    badge.textContent = '0';
    badge.className = 'fab-badge offline';
    label.textContent = '📱 Sin móvil conectado';
  }
  // Dot verde en el botón de cámara del chat
  const chatDot = document.getElementById('chatScanDot');
  if (chatDot) chatDot.style.display = moviles.length > 0 ? 'block' : 'none';
}

async function pollEventos() {
  try {
    const r = await fetch(`${API}/api/sync/eventos?desde=${encodeURIComponent(_syncDesde)}&excluir_origen=office`, {
      headers: { Authorization: `Bearer ${adminToken}` }
    });
    const d = await r.json();
    if (d.servidor) _syncDesde = d.servidor;
    for (const ev of (d.eventos || [])) {
      procesarEventoSync(ev);
    }
  } catch {}
}

function procesarEventoSync(ev) {
  const datos = typeof ev.datos === 'string' ? JSON.parse(ev.datos || '{}') : (ev.datos || {});

  if (ev.tipo === 'scan_resultado' || ev.tipo === 'foto_resultado') {
    // ¡Resultado de escaneo! La foto ha llegado, ahora Alejandra la procesa
    _scanResultados.unshift({ ...ev, datos });
    if (_scanPendiente) {
      cerrarScanModal();
      // Mostrar "procesando con Alejandra..."
      mostrarProcesandoModal(datos.subtipo || 'documento');
    }
    mostrarToast('📸 Foto recibida', 'Alejandra está extrayendo los datos...', 'scan');
    actualizarSeccionDispositivos();
  } else if (ev.tipo === 'scan_procesado') {
    // Alejandra terminó de extraer datos → abrir modal de revisión editable
    if (_scanPendiente) _scanPendiente = null;
    cerrarProcesandoModal();
    abrirModalRevision(datos);
  } else if (ev.tipo === 'scan_error') {
    cerrarProcesandoModal();
    if (_scanPendiente) _scanPendiente = null;
    mostrarToast('❌ Error procesando', datos.error || 'No se pudo extraer datos', 'error');
  } else if (ev.tipo === 'scan_guardado') {
    mostrarToast('✅ Guardado en BD', datos.resumen || 'Datos insertados correctamente', 'success');
  } else if (ev.tipo === 'scan_cancelado') {
    if (_scanPendiente) {
      _scanPendiente = null;
      cerrarScanModal();
      mostrarToast('❌ Escaneo cancelado', 'Se canceló desde el móvil', 'warn');
    }
  } else if (ev.tipo === 'sync_data') {
    mostrarToast('🔄 Datos sincronizados', datos.descripcion || 'Nuevos datos desde el móvil', 'info');
  }
}

// ── Scan Modal ──────────────────────────────────────
let _scanTipoSel = 'documento';
const SCAN_TIPOS = [
  { id: 'parte_semanal',   ico: '📅', label: 'Parte semanal' },
  { id: 'albaran_bobinas', ico: '📋', label: 'Albarán bobinas' },
  { id: 'hoja_bobinas',    ico: '🧾', label: 'Hoja control bobinas' },
  { id: 'bobina',          ico: '🔌', label: 'Bobina individual' },
  { id: 'factura',         ico: '💶', label: 'Factura' },
  { id: 'foto_obra',       ico: '🏗️', label: 'Foto de obra' },
  { id: 'documento',       ico: '📄', label: 'Otro documento' },
  { id: 'plano',           ico: '📐', label: 'Plano' },
];

function abrirScanModal() {
  const moviles = _dispositivosConectados.filter(d => d.tipo === 'app');
  if (moviles.length === 0) {
    mostrarToast('📱 Sin móvil', 'No hay ningún teléfono conectado. Abre la app Alejandra IA en el móvil.', 'warn');
    return;
  }

  // Si ya hay uno esperando, mostrar el waiting
  if (_scanPendiente) {
    return;
  }

  _scanTipoSel = 'documento';
  const overlay = document.createElement('div');
  overlay.className = 'scan-overlay';
  overlay.id = 'scanOverlay';
  overlay.innerHTML = `
    <div class="scan-modal">
      <h3>📷 Escanear con el móvil</h3>
      <div class="sub">Se abrirá la cámara en <strong>${moviles[0].nombre || 'tu móvil'}</strong> automáticamente</div>
      <div class="scan-type-grid" id="scanTipoGrid">
        ${SCAN_TIPOS.map(t => `
          <div class="scan-type-btn ${t.id === 'documento' ? 'sel' : ''}" onclick="selScanTipo('${t.id}', this)">
            <span class="ico">${t.ico}</span>
            <span class="lbl">${t.label}</span>
          </div>
        `).join('')}
      </div>
      <div style="margin-bottom:14px">

      </div>

        <button onclick="enviarScanRequest()" class="btn-acc" style="flex:2;padding:10px;font-size:13px">📷 Escanear</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) cerrarScanModal(); };
}

function selScanTipo(tipo, el) {
  _scanTipoSel = tipo;
  document.querySelectorAll('#scanTipoGrid .scan-type-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
}

function cerrarScanModal() {
  const overlay = document.getElementById('scanOverlay');
  if (overlay) overlay.remove();
}

async function enviarScanRequest() {
  const contexto = document.getElementById('scanContexto')?.value || '';
  // Cambiar modal a estado "esperando"
  const modal = document.querySelector('#scanOverlay .scan-modal');
  if (modal) {
    modal.innerHTML = `
      <div class="scan-waiting">
        <div class="spinner"></div>
        <div class="msg">Esperando al móvil...</div>
        <div class="sub">La cámara se abrirá en tu teléfono automáticamente</div>
        <div style="margin-top:16px;font-size:11px;color:var(--muted)">Tipo: ${SCAN_TIPOS.find(t=>t.id===_scanTipoSel)?.label || _scanTipoSel}</div>
        ${contexto ? `<div style="font-size:11px;color:var(--muted)">Contexto: ${esc(contexto)}</div>` : ''}
        <button onclick="cancelarScanRequest()" style="margin-top:20px;padding:8px 20px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer">Cancelar</button>
      </div>`;
  }

  try {
    const r = await fetch(`${API}/api/sync/evento`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
      body: JSON.stringify({
        tipo: 'scan_request',
        origen: 'office',
        datos: {
          subtipo: _scanTipoSel,
          contexto: contexto,
          solicitado_por: 'office',
          timestamp: new Date().toISOString()
        }
      })
    });
    const d = await r.json();
    if (d.ok) {
      _scanPendiente = { id: d.evento_id, tipo: _scanTipoSel, ts: Date.now() };
      // Timeout: 120s max esperando
      setTimeout(() => {
        if (_scanPendiente && _scanPendiente.ts === _scanPendiente.ts) {
          _scanPendiente = null;
          cerrarScanModal();
          mostrarToast('⏰ Tiempo agotado', 'El móvil no respondió al escaneo', 'warn');
        }
      }, 120000);
    }
  } catch (e) {
    cerrarScanModal();
    mostrarToast('❌ Error', 'No se pudo enviar la solicitud: ' + e.message, 'error');
  }
}

function cancelarScanRequest() {
  _scanPendiente = null;
  cerrarScanModal();
  // Enviar evento de cancelación para que el móvil lo sepa
  fetch(`${API}/api/sync/evento`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
    body: JSON.stringify({ tipo: 'scan_cancel', origen: 'office', datos: {} })
  }).catch(() => {});
}

function mostrarToast(titulo, mensaje, tipo = 'info') {

  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';

    : null;

  overlay.innerHTML = `
    <div style="background:var(--surf);border:1px solid var(--border);border-radius:14px;width:96%;max-width:1200px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden">

        </div>

      </div>

        <div style="flex:0 0 40%;padding:12px;border-right:1px solid var(--border);overflow:auto;background:#000">
          <img id="revImg" style="width:100%;cursor:zoom-in" onclick="this.style.cursor=this.style.maxHeight?'zoom-in':'zoom-out';this.style.maxHeight=this.style.maxHeight?'':'none'" alt="Escaneo">
          <div id="revImgErr" style="color:#888;font-size:11px;text-align:center;padding:20px;display:none">No se pudo cargar la imagen</div>
        </div>
        <div style="flex:1;padding:14px;overflow:auto;min-width:0">
          <div id="revContenido"></div>
        </div>
      </div>
      <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--surf2)">
        ${(subtipo==='albaran_bobinas'||subtipo==='hoja_bobinas'||subtipo==='bobina'||subtipo==='parte_semanal')
          ? '<input id="revObraNombre" class="inp" placeholder="Obra (ej: Mercadona Getafe)" style="flex:1;max-width:280px;padding:8px 10px;font-size:12px">'
          : ''}
        <div style="flex:1"></div>
        <button onclick="cerrarModalRevision()" style="padding:9px 18px;background:var(--surf);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px">Descartar</button>
        <button onclick="guardarRevision()" class="btn-acc" id="btnGuardarRev" style="padding:9px 22px;font-size:13px">💾 Guardar en BD</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // Cargar imagen con auth
  if (imgSrc) {
    fetch(imgSrc, { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.blob())
      .then(b => { document.getElementById('revImg').src = URL.createObjectURL(b); })
      .catch(() => {
        document.getElementById('revImg').style.display='none';
        document.getElementById('revImgErr').style.display='block';
      });
  } else {
    document.getElementById('revImg').style.display='none';
  }

  const el = document.getElementById('revisionOverlay');
  if (el) el.remove();
  _revisionDatos = null;
}

function renderRevisionContenido(subtipo, extraido, payload) {
  const c = document.getElementById('revContenido');
  if (!extraido) {
    c.innerHTML = `<div style="color:var(--red);font-size:13px;padding:14px;background:rgba(239,68,68,0.08);border-radius:8px">
      <strong>No se pudo extraer JSON.</strong> Texto crudo de la IA:
      <pre style="white-space:pre-wrap;font-size:11px;margin-top:10px;max-height:300px;overflow:auto;color:var(--text);background:var(--surf2);padding:10px;border-radius:6px">${esc(payload.texto_raw || '')}</pre>
      ${payload.parse_error ? `<div style="margin-top:8px;font-size:11px">Error: ${esc(payload.parse_error)}</div>` : ''}
    </div>`;
    return;

  if (subtipo === 'parte_semanal') {
    renderRevParteSemanal(c, extraido);

    renderRevAlbaranBobinas(c, extraido);

    renderRevHojaBobinas(c, extraido);

    renderRevBobinaIndividual(c, extraido);
  } else {
    // Generico: editor JSON
    c.innerHTML = `<textarea id="revJson" style="width:100%;height:60vh;font-family:monospace;font-size:11px;background:var(--surf2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px">${esc(JSON.stringify(extraido, null, 2))}</textarea>`;

}

function renderFilaTrab(t, i, dias) {
  return `<tr data-idx="${i}">
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rpEmpresa" value="${esc(t.empresa||'')}" style="width:90px;padding:3px 6px;font-size:11px"></td>

      return `<td style="padding:3px 4px;border-bottom:1px solid var(--border);text-align:center">
        <input class="inp rpH" data-dia="${d}" type="number" min="0" max="24" value="${c.horas==null?'':c.horas}" placeholder="h" style="width:42px;padding:3px;font-size:11px;text-align:center">
        <input class="rpF" data-dia="${d}" type="checkbox" ${c.firmo?'checked':''} title="Firmó" style="margin-left:2px">
      </td>`;
    }).join('')}
    <td style="border-bottom:1px solid var(--border)"><button onclick="this.closest('tr').remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px">×</button></td>

function addFilaTrab() {
  const tbody = document.getElementById('rpTbody');
  const i = tbody.children.length;
  const dias = ['lunes','martes','miercoles','jueves','viernes','sabado'];
  tbody.insertAdjacentHTML('beforeend', renderFilaTrab({}, i, dias));
}

function recolectarParteSemanal() {
  const dias = ['lunes','martes','miercoles','jueves','viernes','sabado'];
  const trabajadores = [];
  document.querySelectorAll('#rpTbody tr').forEach(tr => {
    const empresa = tr.querySelector('.rpEmpresa').value.trim();
    const nombre = tr.querySelector('.rpNombre').value.trim();
    if (!nombre) return;
    const t = { empresa, nombre };
    dias.forEach(d => {
      const h = tr.querySelector(`.rpH[data-dia="${d}"]`).value;
      const f = tr.querySelector(`.rpF[data-dia="${d}"]`).checked;
      t[d] = { horas: h ? Number(h) : null, firmo: f };
    });
    trabajadores.push(t);
  });
  return {
    semana: document.getElementById('rpSemana').value.trim(),
    rango_fechas: document.getElementById('rpRango').value.trim(),
    anio: Number(document.getElementById('rpAnio').value) || new Date().getFullYear(),
    trabajadores
  };
}

          <th style="padding:6px;border-bottom:1px solid var(--border);text-align:left">Sección</th>
          <th style="padding:6px;border-bottom:1px solid var(--border);text-align:right">Metros</th>
          <th style="padding:6px;border-bottom:1px solid var(--border);text-align:right">Peso neto</th>
          <th style="padding:6px;border-bottom:1px solid var(--border);text-align:left">Lote</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rabTbody">
        ${bobinas.map((b,i)=>renderFilaBobAlb(b,i)).join('')}
      </tbody>
    </table>
    </div>
    <button onclick="addFilaBobAlb()" style="margin-top:8px;padding:6px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;color:var(--acc2);font-size:11px;cursor:pointer">+ Añadir bobina</button>`;
}
function renderFilaBobAlb(b,i) {
  return `<tr>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rabMat" value="${esc(b.matricula||'')}" style="width:100px;padding:3px 6px;font-size:11px;font-family:monospace"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rabTipo" value="${esc(b.tipo_cable||'')}" style="width:170px;padding:3px 6px;font-size:11px"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rabSec" value="${esc(b.seccion||'')}" style="width:60px;padding:3px 6px;font-size:11px"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rabM" type="number" step="0.01" value="${b.metros??''}" style="width:70px;padding:3px 6px;font-size:11px;text-align:right"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rabPN" type="number" step="0.01" value="${b.peso_neto_kg??''}" style="width:70px;padding:3px 6px;font-size:11px;text-align:right"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rabLote" value="${esc(b.num_lote||'')}" style="width:100px;padding:3px 6px;font-size:11px;font-family:monospace"></td>
    <td><button onclick="this.closest('tr').remove()" style="background:none;border:none;color:var(--red);cursor:pointer">×</button></td>
  </tr>`;
}
function addFilaBobAlb() {
  document.getElementById('rabTbody').insertAdjacentHTML('beforeend', renderFilaBobAlb({},0));
}
function recolectarAlbaranBobinas() {
  const cab = {};
  document.querySelectorAll('.rabCab').forEach(i => { cab[i.dataset.k] = i.value.trim() || null; });
  const bobinas = [];
  document.querySelectorAll('#rabTbody tr').forEach(tr => {
    const mat = tr.querySelector('.rabMat').value.trim();
    if (!mat) return;
    bobinas.push({
      matricula: mat,
      tipo_cable: tr.querySelector('.rabTipo').value.trim() || null,
      seccion: tr.querySelector('.rabSec').value.trim() || null,
      metros: Number(tr.querySelector('.rabM').value) || null,
      peso_neto_kg: Number(tr.querySelector('.rabPN').value) || null,
      num_lote: tr.querySelector('.rabLote').value.trim() || null
    });
  });
  return { cabecera: cab, bobinas };
}

// ── Hoja control bobinas ──────────────────────────────────────────

}
function renderFilaHB(b) {
  return `<tr>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rhbF" value="${esc(b.fecha_recepcion||'')}" placeholder="YYYY-MM-DD" style="width:100px;padding:3px 6px;font-size:11px"></td>

    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rhbA" value="${esc(b.num_albaran||'')}" style="width:100px;padding:3px 6px;font-size:11px"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rhbM" value="${esc(b.matricula||'')}" style="width:90px;padding:3px 6px;font-size:11px;font-family:monospace"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rhbFab" value="${esc(b.fabricante||'')}" style="width:120px;padding:3px 6px;font-size:11px"></td>
    <td style="padding:3px 6px;border-bottom:1px solid var(--border)"><input class="inp rhbC" value="${esc(b.cable||'')}" style="width:70px;padding:3px 6px;font-size:11px"></td>

}
function addFilaHB(){document.getElementById('rhbTbody').insertAdjacentHTML('beforeend', renderFilaHB({}));}
function recolectarHojaBobinas() {
  const bobinas = [];
  document.querySelectorAll('#rhbTbody tr').forEach(tr => {
    const mat = tr.querySelector('.rhbM').value.trim();
    if (!mat) return;
    bobinas.push({
      fecha_recepcion: tr.querySelector('.rhbF').value.trim() || null,
      proveedor: tr.querySelector('.rhbP').value.trim() || null,
      num_albaran: tr.querySelector('.rhbA').value.trim() || null,

// ── Bobina individual ─────────────────────────────────────────────
function renderRevBobinaIndividual(c, d) {
  c.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">
      ${[
        ['matricula','Matrícula',d.matricula],

function recolectarBobinaIndividual() {
  const out = {};
  document.querySelectorAll('.rbiC').forEach(i => { out[i.dataset.k] = i.value.trim() || null; });
  return out;
}

// ── Guardar revisión (POST a /api/sync/confirmar) ─────────────────
async function guardarRevision() {
  if (!_revisionDatos) return;
  const subtipo = _revisionDatos.subtipo;
  let datos;
  try {
    if (subtipo === 'parte_semanal') datos = recolectarParteSemanal();
    else if (subtipo === 'albaran_bobinas') datos = recolectarAlbaranBobinas();
    else if (subtipo === 'hoja_bobinas') datos = recolectarHojaBobinas();
    else if (subtipo === 'bobina') datos = recolectarBobinaIndividual();
    else datos = JSON.parse(document.getElementById('revJson').value);
  } catch (e) {
    mostrarToast('❌ Error', 'Datos inválidos: ' + e.message, 'error');
    return;
  }
  const obraNombre = document.getElementById('revObraNombre')?.value.trim() || null;
  const btn = document.getElementById('btnGuardarRev');
  btn.disabled = true; btn.textContent = '⏳ Guardando...';
  try {
    const r = await fetch(`${API}/api/sync/confirmar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
      body: JSON.stringify({
        subtipo,
        datos,
        archivo_key: _revisionDatos.archivo_key,
        obra_nombre: obraNombre
      })
    });
    const j = await r.json();
    if (j.ok) {
      mostrarToast('✅ Guardado', j.resumen || `${j.total} registros guardados`, 'success');
      cerrarModalRevision();
    } else {
      mostrarToast('❌ Error', j.error || 'No se pudo guardar', 'error');
      btn.disabled = false; btn.textContent = '💾 Guardar en BD';
    }
  } catch (e) {
    mostrarToast('❌ Error red', e.message, 'error');
    btn.disabled = false; btn.textContent = '💾 Guardar en BD';
  }
}

function renderScanResult(ev) {
  const d = ev.datos || {};
  const tipoInfo = SCAN_TIPOS.find(t => t.id === d.subtipo) || { ico: '📄', label: d.subtipo || 'Documento' };
  return `
    <div class="scan-result">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:18px">${tipoInfo.ico}</span>
        <strong style="font-size:13px">${esc(tipoInfo.label)}</strong>
        <span class="badge b-green" style="margin-left:auto">recibido</span>
      </div>
      ${d.descripcion ? `<div style="font-size:13px;color:var(--text);line-height:1.5">${esc(d.descripcion)}</div>` : ''}
      ${ev.archivo_key ? `<div style="font-size:11px;color:var(--acc2);margin-top:4px">📎 ${esc(ev.archivo_key)}</div>` : ''}
      <div class="sr-meta">${fmtDate(ev.created_at)} · desde ${esc(ev.origen || 'app')}</div>
    </div>`;
}

// ═══════════════ HELPERS ════════════════════════════════════
async function adminFetch(path, method='GET', body=null) {
  const opts = { method, headers:{ Authorization:`Bearer ${adminToken}` } };
  if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const r = await fetch(`${API}${path}`, opts);
  if (r.status===403) throw new Error('No autorizado — token inválido');
  return r.json();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function fmtDate(str) {
  if (!str) return '?';
  try { return new Date(str).toLocaleString('es-ES',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return str; }
}

function fmtN(n) {
  if (!n && n!==0) return '–';
  return Number(n).toLocaleString('es-ES');
}

// ═══════════════ INIT ═══════════════════════════════════════
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) { handleGoogleCallback(code); return; }
  const saved = localStorage.getItem('alej_token');
  if (saved) { adminToken = saved; showApp(); }
})();
</script>
