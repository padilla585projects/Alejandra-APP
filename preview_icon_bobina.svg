<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Cuerpo cilíndrico (tambor central) -->
  <rect x="28" y="38" width="44" height="32" rx="3" fill="#8B6914"/>
  <!-- Tablones del cuerpo -->
  <rect x="28" y="38" width="8" height="32" rx="1" fill="#A07820" opacity="0.6"/>
  <rect x="37" y="38" width="8" height="32" rx="1" fill="#7a5c10" opacity="0.4"/>
  <rect x="46" y="38" width="8" height="32" rx="1" fill="#A07820" opacity="0.5"/>
  <rect x="55" y="38" width="8" height="32" rx="1" fill="#7a5c10" opacity="0.4"/>
  <rect x="64" y="38" width="8" height="32" rx="1" fill="#A07820" opacity="0.3"/>

  <!-- Disco inferior -->
  <ellipse cx="50" cy="70" rx="30" ry="8" fill="#9B7420"/>
  <ellipse cx="50" cy="70" rx="30" ry="8" fill="none" stroke="#7a5c10" stroke-width="1"/>
  <!-- Tablones disco inferior -->
  <line x1="22" y1="68" x2="78" y2="68" stroke="#7a5c10" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="72" x2="76" y2="72" stroke="#c49530" stroke-width="0.6" opacity="0.4"/>
  <!-- Tornillos disco inferior -->
  <circle cx="32" cy="70" r="1.5" fill="#f97316"/>
  <circle cx="50" cy="70" r="1.5" fill="#f97316"/>
  <circle cx="68" cy="70" r="1.5" fill="#f97316"/>

  <!-- Disco superior (más grande, perspectiva) -->
  <ellipse cx="50" cy="36" rx="32" ry="10" fill="#C4A030"/>
  <!-- Tablones disco superior -->
  <line x1="20" y1="34" x2="80" y2="34" stroke="#9B7820" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="36" x2="80" y2="36" stroke="#e8c060" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="38" x2="80" y2="38" stroke="#9B7820" stroke-width="1" opacity="0.5"/>
  <!-- Brillo superior -->
  <ellipse cx="50" cy="35" rx="32" ry="10" fill="none" stroke="#e8c870" stroke-width="0.8" opacity="0.5"/>
  <!-- Tornillos disco superior -->
  <circle cx="30" cy="35" r="2" fill="#f97316" stroke="#c97316" stroke-width="0.5"/>
  <circle cx="50" cy="32" r="2" fill="#f97316" stroke="#c97316" stroke-width="0.5"/>
  <circle cx="70" cy="35" r="2" fill="#f97316" stroke="#c97316" stroke-width="0.5"/>
  <circle cx="50" cy="39" r="2" fill="#f97316" stroke="#c97316" stroke-width="0.5"/>
  <!-- Agujero central superior -->
  <ellipse cx="50" cy="36" rx="5" ry="3" fill="#3a2a08"/>
  <ellipse cx="50" cy="35.5" rx="4" ry="2" fill="#1a1208"/>

</svg>
