name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site (excluir archivos de backend)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp panel.html _site/
          cp sw.js _site/ 2>/dev/null || true
          cp .nojekyll _site/ 2>/dev/null || true
          cp -r icons _site/ 2>/dev/null || true
          cp -r fonts _site/ 2>/dev/null || true
          cp -r img _site/ 2>/dev/null || true
          cp manifest.json _site/ 2>/dev/null || true
          cp favicon.ico _site/ 2>/dev/null || true
          VERSION=$(grep -oP "(?<=APP_VERSION = ')[\d.]+" index.html | head -1)
          echo "{\"v\":\"$VERSION\"}" > _site/version.json
          echo "Version desplegada: $VERSION" && ls -lh _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
