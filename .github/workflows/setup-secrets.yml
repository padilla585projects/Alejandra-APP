name: Configurar Secrets Cloudflare (ejecutar una vez)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Instalar secrets en alejandra-agente worker
    runs-on: ubuntu-latest

    steps:
      - name: Instalar wrangler
        run: npm install -g wrangler@latest

      - name: Configurar ANTHROPIC_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d65ead2b2967bf68ff3848a36cd7b1b4
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: echo "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY --name alejandra-agente

      - name: Configurar OPENAI_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d65ead2b2967bf68ff3848a36cd7b1b4
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: echo "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY --name alejandra-agente

      - name: Resultado
        run: echo "✅ Secrets configurados correctamente en alejandra-agente"
